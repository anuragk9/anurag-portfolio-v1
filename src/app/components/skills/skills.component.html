<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 3rem; margin-bottom: 3rem;">
  <div *ngFor="let skill of skillsData" 
       style="display: flex; flex-direction: column; align-items: center; transition: transform 0.3s ease; cursor: pointer;"
       onmouseover="this.style.transform='scale(1.2)'"
       onmouseout="this.style.transform='scale(1)'">
    <i [class]="skill.icon" style="font-size: clamp(3.5rem, 8vw, 5rem); margin-bottom: 0.8rem; text-shadow: 0px 4px 10px rgba(0,0,0,0.2);"></i>
    <span style="color: #cbd5e1; font-size: 1rem; font-weight: 500; text-align: center;">{{ skill.name }}</span>
  </div>
</div>
