<section class="full-width-section" id="education">
  <div class="split-container">
    
    <!-- Left Side: Lottie Animation -->
    <div class="graphic-side">
      <ng-lottie [options]="options" width="100%" height="400px"></ng-lottie>
    </div>

    <!-- Right Side: Education Content -->
    <div class="content-side">
      <h3 class="section-title">Education</h3>
      
      <div class="edu-grid">
        <div *ngFor="let edu of educationData" class="edu-card">
          <div class="edu-header">
            <h4>{{ edu.degree }}</h4>
            <span class="edu-year">{{ edu.year }}</span>
          </div>
          <p class="institution">{{ edu.institution }}</p>
          <p *ngIf="edu.details" class="edu-details">{{ edu.details }}</p>
        </div>
      </div>
    </div>

  </div>
</section>
