<section class="card experience-section">
  <h3><span style="font-size: 1.2rem;">💼</span> Professional Experience</h3>
  
  <div class="timeline" style="border-left: 2px solid #334155; padding-left: 1.5rem; margin-left: 0.5rem;">
    <!-- Loop through Jobs -->
    <div *ngFor="let job of experienceData" class="job-entry" style="position: relative; margin-bottom: 2.5rem;">
      <!-- Timeline dot -->
      <div style="position: absolute; left: -1.85rem; top: 0.4rem; width: 12px; height: 12px; border-radius: 50%; background: #38bdf8; box-shadow: 0 0 10px #38bdf8;"></div>
      
      <h4 style="font-size: 1.25rem; color: #f8fafc;">{{ job.role }} <span style="color: #38bdf8;">{{ job.company }}</span></h4>
      <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 1rem;">{{ job.duration }}</p>
      
      <!-- Loop through Projects -->
      <div *ngFor="let project of job.projects" style="background: #0f172a; padding: 1.5rem; border-radius: 8px; margin-bottom: 1rem; border: 1px solid #1e293b;">
        <h5 style="color: #e2e8f0; font-size: 1.1rem; margin-bottom: 0.5rem;">{{ project.name }}</h5>
        <p style="color: #94a3b8; font-size: 0.85rem; margin-bottom: 1rem; font-style: italic;">{{ project.description }}</p>
        
        <ul style="list-style-type: none; padding: 0;">
          <li *ngFor="let highlight of project.highlights" style="margin-bottom: 0.5rem; display: flex; align-items: flex-start; gap: 0.5rem;">
            <span style="color: #38bdf8;">▹</span> 
            <span style="color: #cbd5e1;">{{ highlight }}</span>
          </li>
        </ul>
      </div>
    </div>
  </div>
</section>
