<section class="full-width-section" id="experience">
  <div class="split-container">
    
    <div class="content-side">
      <h3 class="section-title">Experience</h3>
      <div class="timeline">
        <div *ngFor="let job of experienceData" class="job-entry">
          <div class="timeline-dot"></div>
          <h4>{{ job.role }} <span> {{ job.company }}</span></h4>
          <p class="duration">{{ job.duration }}</p>
          
          <div *ngFor="let project of job.projects" class="project-card">
            <h5>{{ project.name }}</h5>
            <p class="project-desc">{{ project.description }}</p>
            <ul>
              <li *ngFor="let highlight of project.highlights">▹ {{ highlight }}</li>
            </ul>
          </div>
        </div>
      </div>
    </div>

    <div class="graphic-side">
      <ng-lottie [options]="options" width="100%" height="500px"></ng-lottie>
    </div>

  </div>
</section>
