<header class="hero-section">
  <div class="hero-container">
    
    <div class="hero-content">
  <div class="status-badge">
    <span class="pulse-dot"></span> Available for new opportunities
  </div>
  
  <h1 class="hero-name">{{ info.name }}</h1>
  
  <div class="typing-container">
    <h2 class="typing-role">{{ info.role }}</h2>
  </div>

  <p class="hero-subline">
    Architecting scalable microservices and high-performance cloud infrastructure.
  </p>
  
  <div class="action-buttons">
    <a href="#experience" class="btn btn-primary">View Experience</a>
    <a href="mailto:{{ info.email }}" class="btn btn-secondary">Let's Connect</a>
  </div>

  <div class="minimal-contact">
    <span>📍 {{ info.location }}</span>
    <span class="divider">•</span>
    <span>📞 {{ info.phone }}</span>
    <span class="divider">•</span>
    <a href="https://{{ info.linkedin }}" target="_blank" class="linkedin-link">LinkedIn ↗</a>
  </div>
</div>

    <div class="hero-graphic">
      <div class="floating-element lottie-placeholder">
        <div class="graphic-circle"></div>
          <ng-lottie [options]="options" width="400px" height="400px" style="position: relative; z-index: 2;"></ng-lottie>
      </div>
    </div>

  </div>
</header>
