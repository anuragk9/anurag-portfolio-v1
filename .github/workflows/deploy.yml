name: Deploy Angular to GitHub Pages

# This tells GitHub to run this script every time you push to the 'main' branch
on:
  push:
    branches:
      - main  # Change to 'master' if your default branch is called master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Grab your code from the repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Recommended for Angular 19
          cache: 'npm'

      # 3. Install project dependencies
      - name: Install Dependencies
        run: npm ci

      # 4. Build the Angular app (Replace with your repo name!)
      - name: Build Project
        run: npx ng build --base-href=/anurag-portfolio-v1/

      # 5. Deploy the built files to the gh-pages branch
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Replace YOUR_PROJECT_NAME with your exact dist folder name
          publish_dir: ./dist/anurag-portfolio/browser